---
- name: Baseline configuration for all hosts
  hosts: all
  become: true
  tasks:
    - name: Set timezone
      community.general.timezone:
        name: America/Denver

    - name: Ensure common packages are installed (RHEL family)
      ansible.builtin.dnf:
        name:
          - vim-enhanced
          - htop
          - tmux
          - curl
          - wget
          - git
          - rsync
          - net-tools
          - bind-utils
          - gcc
          - ripgrep
          - fd-find
          - unzip       
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Install latest neovim
      ansible.builtin.unarchive:
        src: https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.tar.gz
        dest: /opt
        remote_src: true
        creates: /opt/nvim-linux-x86_64

    - name: Symlink neovim to PATH
      ansible.builtin.file:
        src: /opt/nvim-linux-x86_64/bin/nvim
        dest: /usr/local/bin/nvim
        state: link

    - name: Ensure NTP sync is enabled
      ansible.builtin.systemd:
        name: chronyd
        state: started
        enabled: true

    - name: Ensure firewalld is running
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true

    - name: Allow SSH through firewall
      ansible.posix.firewalld:
        service: ssh
        permanent: true
        state: enabled
        immediate: true

    - name: Ensure passwordless sudo for lantzops
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/lantzops
        line: 'lantzops ALL=(ALL) NOPASSWD: ALL'
        create: true
        mode: '0440'
        validate: 'visudo -cf %s'
